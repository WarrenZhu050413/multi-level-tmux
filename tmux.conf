# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                    DELIGHTFUL MULTILEVEL TMUX (DMT)                       ║
# ║                         Configuration File v3.0                           ║
# ║                                                                            ║
# ║  "One tmux to rule them all, nine levels to bind them"                   ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ┌──────────────────────────────────────────────────────────────────────────┐
# │                             CORE SETTINGS                                 │
# └──────────────────────────────────────────────────────────────────────────┘

# Primary prefix key (Ctrl+X) — used by active multilevel sessions
unbind C-x
set -g prefix C-x
bind C-x send-prefix

# Base window indexing starts at 1
set -g base-index 1

# Terminal color support
set-option -g default-terminal screen-256color

# Disable repeat time — arrow keys work immediately after switching windows
set-option -g repeat-time 0

# Disable assume-paste-time (iTerm2 "Send Hex Codes" compatibility)
set-option -g assume-paste-time 0

# Default shell
set-option -g default-command "$SHELL"

# ┌──────────────────────────────────────────────────────────────────────────┐
# │                    DELIGHTFUL MULTILEVEL NAVIGATION                       │
# │                         9-Level Tmux System                               │
# └──────────────────────────────────────────────────────────────────────────┘
#
# QUICK REFERENCE:
#   Direct jumps: Ctrl+X then !@#$%^&*(  → Levels 1-9
#   Sequential:   Ctrl+N (down), Ctrl+P (up)
#   Emergency:    Ctrl+X !  → Reset to Level 1
#   Help:         Run `tmux-level-help`

# Initialize active level (restore from state file if server restarted)
set -g @active_level 1
run-shell 'l=$(cat ~/.tmux_level_state 2>/dev/null) && case "$l" in [1-9]) tmux set-option -g @active_level "$l" ;; esac'

# Direct level jumps: prefix + Shift+1-9
bind ! run-shell '~/.local/bin/tmux-multilevel/core/tmux-goto-level 1'
bind @ run-shell '~/.local/bin/tmux-multilevel/core/tmux-goto-level 2'
bind '#' run-shell '~/.local/bin/tmux-multilevel/core/tmux-goto-level 3'
bind '$' run-shell '~/.local/bin/tmux-multilevel/core/tmux-goto-level 4'
bind % run-shell '~/.local/bin/tmux-multilevel/core/tmux-goto-level 5'
bind '^' run-shell '~/.local/bin/tmux-multilevel/core/tmux-goto-level 6'
bind '&' run-shell '~/.local/bin/tmux-multilevel/core/tmux-goto-level 7'
bind '*' run-shell '~/.local/bin/tmux-multilevel/core/tmux-goto-level 8'
bind '(' run-shell '~/.local/bin/tmux-multilevel/core/tmux-goto-level 9'

# Sequential navigation: Ctrl+N = down, Ctrl+P = up (both root and off tables)
bind -T root C-n run-shell "$HOME/.local/bin/tmux-multilevel/core/tmux-level-down"
bind -T root C-p run-shell "$HOME/.local/bin/tmux-multilevel/core/tmux-level-up"
bind -T off  C-n run-shell "$HOME/.local/bin/tmux-multilevel/core/tmux-level-down"
bind -T off  C-p run-shell "$HOME/.local/bin/tmux-multilevel/core/tmux-level-up"

# Session-created hook — only acts on multilevel sessions (MT_LEVEL env var).
# Normal tmux new-session is completely unaffected.
# Usage: tmux new-session -e MT_LEVEL=3 -s backend
set-hook -g session-created 'run-shell "~/.local/bin/tmux-multilevel/core/tmux-session-hook #{hook_session_name}"'

# ┌──────────────────────────────────────────────────────────────────────────┐
# │                         WINDOW MANAGEMENT                                 │
# └──────────────────────────────────────────────────────────────────────────┘

bind-key space next-window
bind-key bspace previous-window
bind-key a next-window
bind-key A previous-window
bind-key enter next-layout
bind-key c new-window
bind-key t choose-tree -Zs
bind-key R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."
bind-key : command-prompt
bind-key r refresh-client
bind-key L clear-history
bind-key q display-panes
set-window-option -g display-panes-time 1500

# ┌──────────────────────────────────────────────────────────────────────────┐
# │                          PANE MANAGEMENT                                  │
# └──────────────────────────────────────────────────────────────────────────┘

# Vim-style splits (preserve current path)
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key ' ' last-pane

# Layout management
bind-key H select-layout even-horizontal
bind-key V select-layout even-vertical
bind-key + select-layout main-horizontal
bind-key = select-layout main-vertical
bind-key C-o rotate-window

# Synchronize panes toggle
bind-key S setw synchronize-panes \; display-message "Pane sync: #{?pane_synchronized,ON,OFF}"

set-window-option -g other-pane-height 25
set-window-option -g other-pane-width 80

# Smart pane switching with vim awareness
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)n?vim$' && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)n?vim$' && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)n?vim$' && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)n?vim$' && tmux send-keys C-l) || tmux select-pane -R"
bind -n 'C-\' run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)n?vim$' && tmux send-keys 'C-\\') || tmux select-pane -l"
bind C-l send-keys 'C-l'

set -g aggressive-resize on

# ┌──────────────────────────────────────────────────────────────────────────┐
# │                        COPY MODE & CLIPBOARD                              │
# └──────────────────────────────────────────────────────────────────────────┘

setw -g mode-keys vi
bind-key x copy-mode
bind-key p paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi C-r send-keys -X rectangle-toggle

# ┌──────────────────────────────────────────────────────────────────────────┐
# │                         STATUS BAR & APPEARANCE                           │
# └──────────────────────────────────────────────────────────────────────────┘

# Status-interval: 5s is a good balance. Use 1 for real-time, 15 for low CPU.
set-option -g status-interval 5
set-option -g status-left ''
set-option -g status-right "#(~/.local/bin/tmux-multilevel/core/tmux-level-status --visual #S) #{?client_prefix,[ACTIVE],} | %l:%M%p"

set-window-option -g window-status-current-style fg=magenta
set-option -g status-style bg=black,fg=default
set-option -g pane-active-border-style fg=colour215,bold
set-option -g pane-border-style fg=colour238

# Solarized Light auto-detect
if-shell "[ \"$COLORFGBG\" = \"11;15\" ]" "set-option -g status-style bg=white"
if-shell "[ \"$COLORFGBG\" = \"11;15\" ]" "set-option -g pane-active-border-style fg=colour215,bold"
if-shell "[ \"$COLORFGBG\" = \"11;15\" ]" "set-option -g pane-border-style fg=colour250"

setw -g monitor-activity on
set -g visual-activity on

# ┌──────────────────────────────────────────────────────────────────────────┐
# │                            MOUSE SUPPORT                                  │
# └──────────────────────────────────────────────────────────────────────────┘

set -g mouse on
bind-key -T root WheelUpPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; copy-mode -e; send-keys -M"
bind-key -T root WheelDownPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; send-keys -M"

# ┌──────────────────────────────────────────────────────────────────────────┐
# │                         MISCELLANEOUS                                     │
# └──────────────────────────────────────────────────────────────────────────┘

unbind -n S-Enter
